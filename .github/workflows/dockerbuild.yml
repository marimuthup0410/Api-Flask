name: Docker Build Push 

on:
 workflow_dispatch:

jobs:
 docker-build:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Docker Login
      uses: docker/login-action@v3.7.0
      with:
       username: ${{vars.DOCKER_HUB_USERNAME}}
       password: ${{secrets.DOCKER_HUB}}
    - name: Docker Build
      run: |
       docker build -t my-app:1.0 .
    - name: Docker tag
      run: |
       docker tag my-app:1.0 marimuthup04/marimuthudockrepo:1.0
    - name: Docker push
      run: |
       docker push marimuthup04/marimuthudockrepo:1.0
    - name: Docker run  
      run: |
       docker run -d -p 5000:5000 marimuthup04/marimuthudockrepo:1.0
       
       
    
   
